name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + unit tests + build
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: go vet
        run: go vet ./...
      - name: unit tests
        run: go test ./...
      - name: build static binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=$(cat VERSION)" \
            -o dist/okboy-linux-amd64 ./cmd/okboy
          file dist/okboy-linux-amd64

  integration:
    name: real nftables integration (isolated netns)
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: ensure nftables present
        run: sudo apt-get update -qq && sudo apt-get install -y nftables
      - name: run nft integration test in a network namespace
        run: |
          go test -tags integration -c -o /tmp/nfttest ./internal/firewall/
          sudo ip netns add okboy_ci
          sudo ip netns exec okboy_ci env PATH=/usr/sbin:/usr/bin:/bin \
            /tmp/nfttest -test.run TestNftIntegration -test.v
          sudo ip netns del okboy_ci
