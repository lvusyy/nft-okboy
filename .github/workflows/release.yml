name: Release

# Push a tag like v0.2.0 to build the static binary and publish a GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: build static binaries (amd64, arm64, armv7)
        run: |
          mkdir -p dist
          V="${GITHUB_REF_NAME#v}"
          LD="-s -w -X main.version=$V"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64       go build -trimpath -ldflags "$LD" -o dist/okboy-linux-amd64 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64       go build -trimpath -ldflags "$LD" -o dist/okboy-linux-arm64 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags "$LD" -o dist/okboy-linux-armv7 ./cmd/okboy
          ( cd dist && sha256sum okboy-linux-* > SHA256SUMS )
      - name: publish release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/okboy-linux-amd64 dist/okboy-linux-arm64 dist/okboy-linux-armv7 dist/SHA256SUMS \
            --title "okboy ${GITHUB_REF_NAME}" --generate-notes
