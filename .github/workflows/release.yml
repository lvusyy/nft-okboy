name: Release

# Push a tag like v0.2.0 to build the static binary and publish a GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: build static linux/amd64 binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v}" \
            -o dist/okboy-linux-amd64 ./cmd/okboy
          ( cd dist && sha256sum okboy-linux-amd64 > okboy-linux-amd64.sha256 )
      - name: publish release with binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/okboy-linux-amd64 dist/okboy-linux-amd64.sha256 \
            --title "okboy ${GITHUB_REF_NAME}" --generate-notes
